<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐟 Fish Dream</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0c0e1a 0%, #1a1a3e 50%, #0c0e1a 100%);
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .container {
      text-align: center;
      z-index: 1;
    }
    h1 {
      font-size: 5rem;
      margin-bottom: 1rem;
      animation: float 3s ease-in-out infinite;
    }
    p {
      font-size: 1.2rem;
      color: #8892b0;
      margin-bottom: 2rem;
    }
    .nav-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.8rem 2rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      color: #64ffda;
      text-decoration: none;
      font-size: 1.1rem;
      transition: all 0.3s ease;
    }
    .nav-link:hover {
      background: rgba(100,255,218,0.1);
      border-color: #64ffda;
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(100,255,218,0.15);
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    .bubbles {
      position: fixed;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .bubble {
      position: absolute;
      background: radial-gradient(circle at 30% 30%, rgba(100,255,218,0.08), transparent);
      border-radius: 50%;
      animation: rise 15s infinite ease-in-out;
    }
    @keyframes rise {
      0%, 100% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }
    footer {
      position: fixed;
      bottom: 1rem;
      font-size: 0.8rem;
      color: #495670;
    }
  </style>
</head>
<body>
  <div class="bubbles" id="bubbles"></div>
  <div class="container">
    <h1>🐟</h1>
    <p>Fish Dream · 梦想启航</p>
    <a href="/123" class="nav-link">🧭 网站导航 →</a>
  </div>
  <footer>Aprilssky · fish-dream</footer>
  <script>
    const container = document.getElementById('bubbles');
    for (let i = 0; i < 15; i++) {
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      const size = Math.random() * 200 + 50;
      bubble.style.width = size + 'px';
      bubble.style.height = size + 'px';
      bubble.style.left = Math.random() * 100 + '%';
      bubble.style.animationDelay = Math.random() * 15 + 's';
      bubble.style.animationDuration = (Math.random() * 10 + 10) + 's';
      container.appendChild(bubble);
    }
  </script>
</body>
</html>
